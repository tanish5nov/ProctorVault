services:
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: neweval-backend
    restart: unless-stopped
    env_file:
      - ./server/.env
    ports:
      - "5001:5001"

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: neweval-frontend
    restart: unless-stopped
    depends_on:
      - backend
    env_file:
      - ./client/.env
    environment:
      HOST: 0.0.0.0
    ports:
      - "3001:3001"
